name: Release

on:
  workflow_dispatch:
    inputs:
      updates_summary:
        description: 'Summary of MCP updates'
        required: false
        type: string
      browser_feedback_version:
        description: 'New version of mcp-claude-code-browser-feedback'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update versions and create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATES_SUMMARY: ${{ inputs.updates_summary }}
          BROWSER_FEEDBACK_VERSION: ${{ inputs.browser_feedback_version }}
        run: |
          set -e

          MCP_VERSIONS=".claude-plugin/mcp-versions.json"

          # Use itkdev-browser-feedback plugin.json as the version source
          VERSION_SOURCE="extensions/itkdev-browser-feedback/.claude-plugin/plugin.json"
          CURRENT_VERSION=$(jq -r '.version' "$VERSION_SOURCE")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          echo "Bumping version: $CURRENT_VERSION -> $NEW_VERSION"

          # Update version in all extension plugin.json files
          for PLUGIN_JSON in extensions/*/.claude-plugin/plugin.json; do
            if [ -f "$PLUGIN_JSON" ]; then
              jq --arg v "$NEW_VERSION" '.version = $v' "$PLUGIN_JSON" > tmp.json && mv tmp.json "$PLUGIN_JSON"
              echo "Updated $PLUGIN_JSON to $NEW_VERSION"
            fi
          done

          # Update root plugin.json
          jq --arg v "$NEW_VERSION" '.version = $v' ".claude-plugin/plugin.json" > tmp.json && mv tmp.json ".claude-plugin/plugin.json"

          # Update mcp-versions.json with new tracked versions
          if [ -n "$BROWSER_FEEDBACK_VERSION" ] && [ "$BROWSER_FEEDBACK_VERSION" != "none" ]; then
            jq --arg v "$BROWSER_FEEDBACK_VERSION" '.["mcp-claude-code-browser-feedback"] = $v' "$MCP_VERSIONS" > tmp.json && mv tmp.json "$MCP_VERSIONS"
          fi

          # Commit changes
          git add .claude-plugin/plugin.json .claude-plugin/mcp-versions.json extensions/*/.claude-plugin/plugin.json
          git commit -m "chore: bump version to $NEW_VERSION

          MCP dependency updates:
          $UPDATES_SUMMARY"

          # Create and push tag
          TAG="v$NEW_VERSION"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin main
          git push origin "$TAG"

          # Create GitHub release
          RELEASE_NOTES="## What's Changed

          This release updates MCP server dependencies:

          $UPDATES_SUMMARY

          ## MCP Versions
          - mcp-claude-code-browser-feedback: $(jq -r '.["mcp-claude-code-browser-feedback"]' "$MCP_VERSIONS")"

          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "$RELEASE_NOTES"

          echo "Released version $NEW_VERSION"
